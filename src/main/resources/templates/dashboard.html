<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sentinel Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<h1>Sentinel Monitoring System</h1>

<h2 class="mt-4">Targets</h2>
<table class="table">
    <thead><tr><th>Name</th><th>URL</th></tr></thead>
    <tbody>
    <tr th:each="t : ${report}">
        <td th:text="${t.name}"></td>
        <td><a th:href="${t.url}" th:text="${t.url}" target="_blank"></a></td>
    </tr>
    </tbody>
</table>

<div class="card mb-4 shadow-sm">
    <div class="card-body">
        <h5 class="card-title">Add New Site to Monitor</h5>
        <form th:action="@{/add-target}" method="post" class="row g-3">
            <div class="col-md-5">
                <input type="text" name="name" class="form-control" placeholder="Site Name (e.g. Facebook)" required>
            </div>
            <div class="col-md-5">
                <input type="url" name="url" class="form-control" placeholder="https://example.com" required>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100">Add Site</button>
            </div>
        </form>
    </div>
</div>

<h2 class="mt-4">Current System Status</h2>
<table class="table table-hover">
    <thead class="table-dark">
    <tr>
        <th>Service</th>
        <th>Current Status</th>
        <th>Last Sync</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="item : ${report}">
        <td th:text="${item.name}" class="fw-bold"></td>
        <td>
                <span th:text="${item.status}"
                      th:classappend="${item.status == 'UP' ? 'badge bg-success' : (item.status == 'DOWN' ? 'badge bg-danger' : 'badge bg-secondary')}">
                </span>
        </td>
        <td th:text="${item.lastCheck != null ? #temporals.format(item.lastCheck, 'HH:mm:ss') : '-'}"></td>
        <td>
            <form th:action="@{'/delete-target/' + ${item.id}}" method="post" style="display:inline;">
                <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
